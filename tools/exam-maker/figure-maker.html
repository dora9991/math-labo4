<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>図形メーカー（プロトタイプ）</title>
<style>
  :root{
    --line:#1f2937; --line-w:2.5;
    --vtx:#2563eb; --vtx-active:#dc2626;
    --fill:rgba(37,99,235,.06);
    --sel:#f59e0b;
    --bg:#f8fafc; --panel:#fff; --ink:#0f172a; --sub:#64748b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  header{padding:10px 14px 4px}
  header h1{font-size:16px;margin:0 0 2px}
  header p{margin:0;font-size:12px;color:var(--sub);line-height:1.5}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px;border-bottom:1px solid #e2e8f0;background:var(--panel)}
  button{font:inherit;font-size:14px;font-weight:600;padding:9px 14px;border-radius:11px;border:1px solid #cbd5e1;background:#fff;color:var(--ink);cursor:pointer;touch-action:manipulation}
  button:active{transform:translateY(1px)}
  button.primary{background:var(--vtx);border-color:var(--vtx);color:#fff}
  button.go{background:#059669;border-color:#059669;color:#fff}
  button.danger{color:#b91c1c;border-color:#fecaca;background:#fff5f5}
  button.ghost{background:transparent;border-color:transparent;color:var(--sub)}
  .spacer{flex:1}
  .stage{flex:1;position:relative;overflow:hidden;background:
     linear-gradient(#eef2f7 1px,transparent 1px) 0 0/24px 24px,
     linear-gradient(90deg,#eef2f7 1px,transparent 1px) 0 0/24px 24px,#fff}
  svg{display:block;width:100%;height:100%;touch-action:none}
  polygon.body{fill:var(--fill);stroke:none;cursor:move}
  line.edge{stroke:var(--line);stroke-width:var(--line-w);stroke-linecap:round}
  line.hit{stroke:transparent;stroke-width:22;stroke-linecap:round;cursor:move}
  path.dim{fill:none;stroke:var(--line);stroke-width:1.6}
  circle.vtx{fill:#fff;stroke:var(--vtx);stroke-width:2.5;cursor:grab}
  circle.vtx.active{fill:var(--vtx-active);stroke:var(--vtx-active)}
  circle.vtx.snap{fill:#16a34a;stroke:#16a34a}
  circle.shared{fill:#16a34a}
  g.shape:not(.sel) circle.vtx{display:none}
  g.shape.sel polygon.body{fill:rgba(245,158,11,.10)}
  g.shape.sel line.edge{stroke:var(--sel)}
  text.lbl{font-size:15px;font-weight:700;fill:#111;paint-order:stroke;
    stroke:#fff;stroke-width:4px;stroke-linejoin:round;text-anchor:middle;dominant-baseline:middle;user-select:none;pointer-events:none}
  text.len{stroke-width:7px}
  text.albl{fill:#b91c1c}
  text.nm{font-size:17px;font-weight:800;fill:#1e3a8a;paint-order:stroke;
    stroke:#fff;stroke-width:4px;stroke-linejoin:round;text-anchor:middle;dominant-baseline:middle;user-select:none;pointer-events:auto;cursor:pointer}
  #editor{position:fixed;display:none;z-index:50;transform:translate(-50%,-130%)}
  #editor input{width:96px;font:inherit;font-size:15px;font-weight:700;text-align:center;
    padding:6px 8px;border:2px solid var(--vtx);border-radius:9px;box-shadow:0 6px 22px rgba(0,0,0,.18);background:#fff}
  .hint{position:absolute;left:12px;bottom:10px;font-size:11px;color:var(--sub);
    background:rgba(255,255,255,.85);padding:4px 8px;border-radius:8px;pointer-events:none}
  .region{position:absolute;top:8px;right:12px;font-size:11px;color:#059669;font-weight:700;
    background:rgba(255,255,255,.9);padding:4px 8px;border-radius:8px;pointer-events:none;display:none}
  .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;pointer-events:none}
</style>
</head>
<body>
<header>
  <h1>図形メーカー <span style="font-size:11px;color:var(--sub);font-weight:400">プロトタイプ</span></h1>
  <p>図形をタップで<b>選択</b>→頂点ドラッグで変形・移動 ／ 選択中に<b>辺/頂点/名前タップ</b>で長さ・角度・名前 ／ 頂点どうしは近づけると<b>合体（共有）</b></p>
</header>

<div class="toolbar">
  <button class="primary" data-add="3">▲ 三角形</button>
  <button class="primary" data-add="4">■ 四角形</button>
  <button class="primary" data-add="5">⬠ 五角形</button>
  <button class="primary" id="seg">／ 線分</button>
  <span class="spacer"></span>
  <button class="danger" id="del">選択を削除</button>
  <button class="ghost" id="clear">全消去</button>
  <button class="go" id="export">出力 → exam-maker へ ▶</button>
</div>

<div class="stage" id="stage">
  <svg id="svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="empty" id="empty">上のボタンから図形を追加してください</div>
  <div class="region" id="region"></div>
  <div class="hint">タップ＝選択／入力 ／ 頂点を重ねるとマグネットで共有</div>
</div>

<div id="editor"><input id="lblInput" type="text" inputmode="text" autocomplete="off"></div>

<script>
const SVGNS="http://www.w3.org/2000/svg";
const svg=document.getElementById("svg");
const emptyEl=document.getElementById("empty");
const editor=document.getElementById("editor");
const lblInput=document.getElementById("lblInput");

let P={};
let pidc=1;
let shapes=[];
let uid=1, selId=null;
const TAP_DIST=6, DIM_OFF=26, SNAP=16;

function usedNames(){return new Set(Object.values(P).map(p=>p.name).filter(Boolean));}
function nextLetter(){const u=usedNames();for(let i=0;i<26;i++){const L=String.fromCharCode(65+i);if(!u.has(L))return L;}return "";}
function newPoint(x,y,autoName){const id="p"+(pidc++);P[id]={x,y,name:autoName?nextLetter():""};return id;}
function refCount(pid){let c=0;shapes.forEach(s=>s.v.forEach(q=>{if(q===pid)c++;}));return c;}

function regular(n,cx,cy,r,rot){const a=[];for(let i=0;i<n;i++){const t=rot+i*2*Math.PI/n;a.push({x:cx+r*Math.cos(t),y:cy+r*Math.sin(t)});}return a;}
function EC(s){return s.closed?s.v.length:s.v.length-1;}
function P_(s,i){return P[s.v[i]];}

function makeShape(closed, ptsXY){
  const v=ptsXY.map(p=>newPoint(p.x,p.y,true));
  const s={id:uid++,closed,v,elen:Array(v.length).fill(""),ang:Array(v.length).fill(""),dom:null};
  shapes.push(s); selId=s.id; buildDom(s); refreshEmpty(); return s;
}
function addShape(n){
  const off=(shapes.length%4)*26;
  let pts;
  if(n===4) pts=[{x:-80,y:-70},{x:80,y:-70},{x:80,y:70},{x:-80,y:70}].map(p=>({x:p.x+400+off,y:p.y+260+off}));
  else pts=regular(n,400+off,260+off,95,-Math.PI/2);
  makeShape(true,pts);
}
function addSegment(){
  const off=(shapes.length%4)*26;
  makeShape(false,[{x:300+off,y:300+off},{x:500+off,y:300+off}]);
}

function el(tag,attrs){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

function buildDom(s){
  const g=el("g",{class:"shape"}); g.dataset.id=s.id;
  const body=el("polygon",{class:"body"});
  if(s.closed){body.dataset.kind="body";body.dataset.id=s.id;} else body.style.display="none";
  g.appendChild(body);
  const n=s.v.length, ec=EC(s);
  const arc=[],edge=[],hit=[],elen=[],verts=[],nm=[],ang=[];
  for(let i=0;i<ec;i++){
    arc.push(g.appendChild(el("path",{class:"dim"})));
    edge.push(g.appendChild(el("line",{class:"edge"})));
    const h=el("line",{class:"hit"});h.dataset.kind="edge";h.dataset.id=s.id;h.dataset.idx=i;
    hit.push(g.appendChild(h));
    elen.push(g.appendChild(el("text",{class:"lbl len"})));
  }
  for(let i=0;i<n;i++){
    const c=el("circle",{class:"vtx",r:9});c.dataset.kind="vtx";c.dataset.id=s.id;c.dataset.idx=i;
    verts.push(g.appendChild(c));
  }
  for(let i=0;i<n;i++){
    ang.push(g.appendChild(el("text",{class:"lbl albl"})));
    const t=el("text",{class:"nm"});t.dataset.kind="name";t.dataset.id=s.id;t.dataset.idx=i;
    nm.push(g.appendChild(t));
  }
  svg.appendChild(g);
  s.dom={g,body,arc,edge,hit,elen,verts,nm,ang};
  updateDom(s); markSel();
}

function centroidV(s){let x=0,y=0;s.v.forEach(pid=>{x+=P[pid].x;y+=P[pid].y;});return {x:x/s.v.length,y:y/s.v.length};}
function show(e,on){e.style.display=on?"":"none";}

function updateDom(s){
  const n=s.v.length,d=s.dom,c=centroidV(s),ec=EC(s);
  if(s.closed) d.body.setAttribute("points",s.v.map(pid=>P[pid].x+","+P[pid].y).join(" "));
  for(let i=0;i<ec;i++){
    const a=P_(s,i), b=P_(s,(i+1)%n);
    d.edge[i].setAttribute("x1",a.x);d.edge[i].setAttribute("y1",a.y);
    d.edge[i].setAttribute("x2",b.x);d.edge[i].setAttribute("y2",b.y);
    d.hit[i].setAttribute("x1",a.x);d.hit[i].setAttribute("y1",a.y);
    d.hit[i].setAttribute("x2",b.x);d.hit[i].setAttribute("y2",b.y);
    const txt=s.elen[i]||"";
    d.elen[i].textContent=txt; show(d.arc[i],!!txt);
    if(txt){
      const ex=b.x-a.x,ey=b.y-a.y,L=Math.hypot(ex,ey)||1;
      let nx=-ey/L,ny=ex/L; const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      if((mx-c.x)*nx+(my-c.y)*ny<0){nx=-nx;ny=-ny;}
      const cpx=mx+nx*2*DIM_OFF,cpy=my+ny*2*DIM_OFF,apx=mx+nx*DIM_OFF,apy=my+ny*DIM_OFF;
      d.arc[i].setAttribute("d","M "+a.x+" "+a.y+" Q "+cpx+" "+cpy+" "+b.x+" "+b.y);
      d.elen[i].setAttribute("x",apx);d.elen[i].setAttribute("y",apy);
    }
  }
  for(let i=0;i<n;i++){
    const pid=s.v[i], v=P[pid];
    const cir=d.verts[i];
    cir.setAttribute("cx",v.x);cir.setAttribute("cy",v.y);
    cir.classList.toggle("shared",refCount(pid)>1);
    let ox=v.x-c.x,oy=v.y-c.y;const ol=Math.hypot(ox,oy)||1;ox/=ol;oy/=ol;
    d.nm[i].textContent = isNameOwner(s,i) ? (v.name||"") : "";   // 共有頂点は1図形だけが名前を描く
    d.nm[i].setAttribute("x",v.x+ox*22);d.nm[i].setAttribute("y",v.y+oy*22);
    d.ang[i].textContent=s.ang[i]||"";
    d.ang[i].setAttribute("x",v.x-ox*26);d.ang[i].setAttribute("y",v.y-oy*26);
  }
}
function updateAll(){shapes.forEach(updateDom);}

function markSel(){shapes.forEach(s=>{if(s.dom)s.dom.g.classList.toggle("sel",s.id===selId);});}
function getShape(id){return shapes.find(s=>s.id==id);}
function refreshEmpty(){emptyEl.style.display=shapes.length?"none":"flex";}

function toSvg(cx,cy){const m=svg.getScreenCTM().inverse();const p=svg.createSVGPoint();p.x=cx;p.y=cy;const r=p.matrixTransform(m);return{x:r.x,y:r.y};}
function toScreen(x,y){const m=svg.getScreenCTM();const p=svg.createSVGPoint();p.x=x;p.y=y;const r=p.matrixTransform(m);return{x:r.x,y:r.y};}

// 共有点の名前は「最初にその点を参照する図形」だけが描く
function isNameOwner(s,i){
  const pid=s.v[i];
  for(const sh of shapes){const j=sh.v.indexOf(pid);if(j>=0)return sh===s&&j===i;}
  return true;
}
function nearestPid(x,y,excludePids){
  let bd=SNAP,best=null;
  for(const pid in P){
    if(excludePids.includes(pid)) continue;
    const dd=Math.hypot(P[pid].x-x,P[pid].y-y);
    if(dd<bd){bd=dd;best=pid;}
  }
  return best;
}

let act=null;
svg.addEventListener("pointerdown",e=>{
  const t=e.target,kind=t.dataset&&t.dataset.kind;
  if(!kind){selId=null;markSel();hideEditor();return;}
  const s=getShape(t.dataset.id); if(!s) return;
  const idx=t.dataset.idx!=null?+t.dataset.idx:-1;
  const wasSel=(selId===s.id);
  selId=s.id; markSel(); svg.appendChild(s.dom.g);
  const p=toSvg(e.clientX,e.clientY);
  act={kind,s,idx,wasSel,sx:p.x,sy:p.y,moved:false,snapTo:null,
       orig:s.v.map(pid=>({x:P[pid].x,y:P[pid].y}))};
  if(kind==="vtx") s.dom.verts[idx].classList.add("active");
  svg.setPointerCapture(e.pointerId); hideEditor();
});
svg.addEventListener("pointermove",e=>{
  if(!act) return;
  const p=toSvg(e.clientX,e.clientY);
  const dx=p.x-act.sx,dy=p.y-act.sy;
  if(!act.moved && Math.hypot(dx,dy)>TAP_DIST) act.moved=true;
  if(!act.moved) return;
  const s=act.s;
  if(act.kind==="vtx"){
    const pid=s.v[act.idx];
    let nx=act.orig[act.idx].x+dx, ny=act.orig[act.idx].y+dy;
    const cand=nearestPid(nx,ny,s.v);
    const cl=s.dom.verts[act.idx].classList;
    if(cand){nx=P[cand].x;ny=P[cand].y;act.snapTo=cand;cl.add("snap");}
    else{act.snapTo=null;cl.remove("snap");}
    P[pid].x=nx;P[pid].y=ny; updateAll();
  }else if(act.kind==="edge"||act.kind==="body"){
    s.v.forEach((pid,i)=>{P[pid].x=act.orig[i].x+dx;P[pid].y=act.orig[i].y+dy;});
    updateAll();
  }
});
svg.addEventListener("pointerup",e=>{
  if(!act) return;
  const a=act; act=null;
  if(a.kind==="vtx"){a.s.dom.verts[a.idx].classList.remove("active");a.s.dom.verts[a.idx].classList.remove("snap");}
  try{svg.releasePointerCapture(e.pointerId);}catch(_){}
  if(a.moved && a.kind==="vtx" && a.snapTo){
    const s=a.s, oldPid=s.v[a.idx];
    if(oldPid!==a.snapTo){
      s.v[a.idx]=a.snapTo;
      if(refCount(oldPid)===0) delete P[oldPid];
      updateAll();
    }
  }
  if(!a.moved && a.wasSel){
    if(a.kind==="edge") openEditor(a.s,"elen",a.idx);
    else if(a.kind==="vtx") openEditor(a.s,"name",a.idx);
    else if(a.kind==="name") openEditor(a.s,"name",a.idx);
  }
});

let edTarget=null;
function openEditor(s,field,idx){
  edTarget={s,field,idx};
  const pid=s.v[idx];
  const cur=(field==="elen"?s.elen[idx]:field==="ang"?s.ang[idx]:P[pid].name)||"";
  lblInput.value=cur;
  lblInput.placeholder=field==="elen"?"長さ 例:6cm":field==="ang"?"角度 例:60":"名前 例:A";
  const c=centroidV(s); let px,py;
  if(field==="elen"){
    const a=P_(s,idx),b=P_(s,(idx+1)%s.v.length);
    let nx=-(b.y-a.y),ny=(b.x-a.x);const nl=Math.hypot(nx,ny)||1;nx/=nl;ny/=nl;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    if((mx-c.x)*nx+(my-c.y)*ny<0){nx=-nx;ny=-ny;}
    px=mx+nx*DIM_OFF;py=my+ny*DIM_OFF;
  }else{px=P[pid].x;py=P[pid].y;}
  const sc=toScreen(px,py);
  editor.style.left=sc.x+"px";editor.style.top=sc.y+"px";editor.style.display="block";
  setTimeout(()=>{lblInput.focus();lblInput.select();},0);
}
function commitEditor(){
  if(!edTarget) return;
  let v=lblInput.value.trim();
  const o=edTarget,s=o.s;
  if(o.field==="ang" && v && /^-?\d+(\.\d+)?$/.test(v)) v=v+"°";
  if(o.field==="elen") s.elen[o.idx]=v;
  else if(o.field==="ang") s.ang[o.idx]=v;
  else P[s.v[o.idx]].name=v;
  updateAll(); hideEditor();
}
function hideEditor(){editor.style.display="none";edTarget=null;}
lblInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();commitEditor();}if(e.key==="Escape")hideEditor();});
lblInput.addEventListener("blur",commitEditor);

function esc(t){return String(t).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function buildExportSVG(){
  if(!shapes.length) return null;
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const pid in P){const p=P[pid];minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);}
  const pad=55;minx-=pad;miny-=pad;maxx+=pad;maxy+=pad;
  const w=Math.round(maxx-minx),h=Math.round(maxy-miny);
  let bd="";
  const drawnName={};
  shapes.forEach(s=>{
    const n=s.v.length,c=centroidV(s),ec=EC(s);
    for(let i=0;i<ec;i++){
      const a=P_(s,i),b=P_(s,(i+1)%n);
      bd+='<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>';
      const txt=s.elen[i]||"";
      if(txt){
        const ex=b.x-a.x,ey=b.y-a.y,L=Math.hypot(ex,ey)||1;
        let nx=-ey/L,ny=ex/L;const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        if((mx-c.x)*nx+(my-c.y)*ny<0){nx=-nx;ny=-ny;}
        const cpx=mx+nx*2*DIM_OFF,cpy=my+ny*2*DIM_OFF,apx=mx+nx*DIM_OFF,apy=my+ny*DIM_OFF;
        bd+='<path d="M '+a.x+' '+a.y+' Q '+cpx+' '+cpy+' '+b.x+' '+b.y+'" fill="none" stroke="#1f2937" stroke-width="1.6"/>';
        bd+='<text x="'+apx+'" y="'+apy+'" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke" stroke="#fff" stroke-width="7" stroke-linejoin="round" fill="#111" font-size="15" font-weight="700" font-family="sans-serif">'+esc(txt)+'</text>';
      }
    }
    for(let i=0;i<n;i++){
      const pid=s.v[i],v=P[pid];let ox=v.x-c.x,oy=v.y-c.y;const ol=Math.hypot(ox,oy)||1;ox/=ol;oy/=ol;
      if(v.name && !drawnName[pid]){drawnName[pid]=1;
        bd+='<text x="'+(v.x+ox*22)+'" y="'+(v.y+oy*22)+'" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke" stroke="#fff" stroke-width="4" fill="#1e3a8a" font-size="17" font-weight="800" font-family="sans-serif">'+esc(v.name)+'</text>';}
      if(s.ang[i]) bd+='<text x="'+(v.x-ox*26)+'" y="'+(v.y-oy*26)+'" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke" stroke="#fff" stroke-width="4" fill="#b91c1c" font-size="15" font-weight="700" font-family="sans-serif">'+esc(s.ang[i])+'</text>';
    }
  });
  return {svg:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+minx+' '+miny+' '+w+' '+h+'" width="'+w+'" height="'+h+'">'+bd+'</svg>',w,h};
}
function serializeDoc(){return {P,pidc,shapes:shapes.map(s=>({closed:s.closed,v:s.v,elen:s.elen,ang:s.ang}))};}
function loadDoc(doc){
  shapes.forEach(s=>s.dom&&s.dom.g.remove());shapes=[];selId=null;
  P=doc.P||{};pidc=doc.pidc||1;
  (doc.shapes||[]).forEach(o=>{
    const s={id:uid++,closed:o.closed,v:o.v,elen:o.elen,ang:o.ang,dom:null};
    shapes.push(s);buildDom(s);
  });
  selId=null;markSel();refreshEmpty();
}

document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>addShape(+b.dataset.add)));
document.getElementById("seg").addEventListener("click",addSegment);
document.getElementById("del").addEventListener("click",()=>{
  if(selId==null)return;const s=getShape(selId);
  if(s){const pids=s.v.slice();s.dom.g.remove();shapes=shapes.filter(x=>x!==s);
    pids.forEach(pid=>{if(refCount(pid)===0)delete P[pid];});updateAll();}
  selId=null;refreshEmpty();
});
document.getElementById("clear").addEventListener("click",()=>{shapes.forEach(s=>s.dom.g.remove());shapes=[];P={};pidc=1;selId=null;refreshEmpty();});
document.getElementById("export").addEventListener("click",()=>{
  const ex=buildExportSVG();
  if(!ex){alert("図形がありません");return;}
  try{localStorage.setItem("figmaker_doc",JSON.stringify(serializeDoc()));localStorage.setItem("figmaker_pending",JSON.stringify(ex));}catch(_){}
  location.href="./index.html";
});

(function init(){
  const params=new URLSearchParams(location.search);
  try{const rg=JSON.parse(localStorage.getItem("figmaker_region")||"null");
    if(rg){const r=document.getElementById("region");r.style.display="block";r.textContent="▱ 選択範囲に合わせて配置されます（出力時）";}}catch(_){}
  if(params.get("edit")==="1"){
    try{const doc=JSON.parse(localStorage.getItem("figmaker_doc")||"null");
      if(doc&&doc.shapes&&doc.shapes.length){loadDoc(doc);return;}}catch(_){}
  }
  addShape(3);
})();
</script>
