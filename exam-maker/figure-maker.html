<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>図形メーカー（プロトタイプ）</title>
<style>
  :root{
    --line:#1f2937; --line-w:2.5;
    --vtx:#2563eb; --vtx-active:#dc2626;
    --fill:rgba(37,99,235,.06);
    --sel:#f59e0b;
    --bg:#f8fafc; --panel:#fff; --ink:#0f172a; --sub:#64748b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  header{padding:10px 14px 4px; }
  header h1{font-size:16px;margin:0 0 2px}
  header p{margin:0;font-size:12px;color:var(--sub);line-height:1.5}
  .toolbar{
    display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px;
    border-bottom:1px solid #e2e8f0; background:var(--panel);
  }
  button{
    font:inherit;font-size:14px;font-weight:600;
    padding:9px 14px;border-radius:11px;border:1px solid #cbd5e1;
    background:#fff;color:var(--ink);cursor:pointer; touch-action:manipulation;
  }
  button:active{transform:translateY(1px)}
  button.primary{background:var(--vtx);border-color:var(--vtx);color:#fff}
  button.danger{color:#b91c1c;border-color:#fecaca;background:#fff5f5}
  button.ghost{background:transparent;border-color:transparent;color:var(--sub)}
  .spacer{flex:1}
  .stage{flex:1;position:relative;overflow:hidden;background:
     linear-gradient(#eef2f7 1px,transparent 1px) 0 0/24px 24px,
     linear-gradient(90deg,#eef2f7 1px,transparent 1px) 0 0/24px 24px,
     #fff;}
  svg{display:block;width:100%;height:100%;touch-action:none}
  polygon.body{fill:var(--fill);stroke:none}
  line.edge{stroke:var(--line);stroke-width:var(--line-w);stroke-linecap:round}
  line.hit{stroke:transparent;stroke-width:22;stroke-linecap:round;cursor:move}
  circle.vtx{fill:#fff;stroke:var(--vtx);stroke-width:2.5;cursor:grab}
  circle.vtx.active{fill:var(--vtx-active);stroke:var(--vtx-active)}
  g.shape.sel polygon.body{fill:rgba(245,158,11,.10)}
  g.shape.sel line.edge{stroke:var(--sel)}
  g.shape.sel circle.vtx{stroke:var(--sel)}
  text.lbl{font-size:15px;font-weight:700;fill:#111;paint-order:stroke;
    stroke:#fff;stroke-width:4px;stroke-linejoin:round;
    text-anchor:middle;dominant-baseline:middle;user-select:none;pointer-events:none}
  text.albl{fill:#b91c1c}
  #editor{position:fixed;display:none;z-index:50;transform:translate(-50%,-130%)}
  #editor input{
    width:96px;font:inherit;font-size:15px;font-weight:700;text-align:center;
    padding:6px 8px;border:2px solid var(--vtx);border-radius:9px;
    box-shadow:0 6px 22px rgba(0,0,0,.18);background:#fff;
  }
  .hint{position:absolute;left:12px;bottom:10px;font-size:11px;color:var(--sub);
    background:rgba(255,255,255,.85);padding:4px 8px;border-radius:8px;pointer-events:none}
  .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#94a3b8;font-size:14px;pointer-events:none}
</style>
</head>
<body>
<header>
  <h1>図形メーカー <span style="font-size:11px;color:var(--sub);font-weight:400">プロトタイプ</span></h1>
  <p>ボタンで図形を出す ／ <b>頂点</b>をドラッグで変形 ／ <b>辺</b>をドラッグで移動 ／ <b>辺をタップ</b>で長さ ／ <b>頂点をタップ</b>で角度</p>
</header>

<div class="toolbar">
  <button class="primary" data-add="3">▲ 三角形</button>
  <button class="primary" data-add="4">■ 四角形</button>
  <button class="primary" data-add="5">⬠ 五角形</button>
  <span class="spacer"></span>
  <button class="danger" id="del">選択を削除</button>
  <button class="ghost" id="clear">全消去</button>
</div>

<div class="stage" id="stage">
  <svg id="svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="empty" id="empty">上のボタンから図形を追加してください</div>
  <div class="hint">タップ＝ラベル入力 ／ ドラッグ＝動かす</div>
</div>

<div id="editor"><input id="lblInput" type="text" inputmode="text" autocomplete="off"></div>

<script>
const SVGNS="http://www.w3.org/2000/svg";
const svg=document.getElementById("svg");
const stage=document.getElementById("stage");
const emptyEl=document.getElementById("empty");
const editor=document.getElementById("editor");
const lblInput=document.getElementById("lblInput");

let shapes=[];
let uid=1;
let selId=null;
const TAP_DIST=6;

function regular(n,cx,cy,r,rot){
  const p=[];
  for(let i=0;i<n;i++){
    const a=rot + i*2*Math.PI/n;
    p.push({x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)});
  }
  return p;
}
function addShape(n){
  const off=(shapes.length%4)*26;
  let pts;
  if(n===4) pts=[{x:-80,y:-70},{x:80,y:-70},{x:80,y:70},{x:-80,y:70}].map(p=>({x:p.x+400+off,y:p.y+260+off}));
  else pts=regular(n,400+off,260+off,95,-Math.PI/2);
  const s={id:uid++, pts, elen:Array(n).fill(""), ang:Array(n).fill(""), dom:null};
  shapes.push(s);
  selId=s.id;
  buildDom(s);
  refreshEmpty();
}

function el(tag,attrs){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

function buildDom(s){
  const g=el("g",{class:"shape"}); g.dataset.id=s.id;
  const body=el("polygon",{class:"body"});
  g.appendChild(body);
  const edges=[],verts=[];
  const n=s.pts.length;
  for(let i=0;i<n;i++){
    const edge=el("line",{class:"edge"});
    const hit=el("line",{class:"hit"}); hit.dataset.kind="edge"; hit.dataset.id=s.id; hit.dataset.idx=i;
    g.appendChild(edge); g.appendChild(hit);
    edges.push(edge);
  }
  const et=[],at=[];
  for(let i=0;i<n;i++){
    const t=el("text",{class:"lbl"}); g.appendChild(t); et.push(t);
    const a=el("text",{class:"lbl albl"}); g.appendChild(a); at.push(a);
  }
  for(let i=0;i<n;i++){
    const c=el("circle",{class:"vtx",r:9}); c.dataset.kind="vtx"; c.dataset.id=s.id; c.dataset.idx=i;
    g.appendChild(c); verts.push(c);
  }
  svg.appendChild(g);
  s.dom={g,body,edges,verts,elen:et,ang:at,hits:[...g.querySelectorAll("line.hit")]};
  updateDom(s);
  markSel();
}

function centroid(pts){
  let x=0,y=0; pts.forEach(p=>{x+=p.x;y+=p.y;}); return {x:x/pts.length,y:y/pts.length};
}

function updateDom(s){
  const p=s.pts,n=p.length,d=s.dom,c=centroid(p);
  const ptsStr=p.map(q=>q.x+","+q.y).join(" ");
  d.body.setAttribute("points",ptsStr);
  for(let i=0;i<n;i++){
    const a=p[i], b=p[(i+1)%n];
    d.edges[i].setAttribute("x1",a.x);d.edges[i].setAttribute("y1",a.y);
    d.edges[i].setAttribute("x2",b.x);d.edges[i].setAttribute("y2",b.y);
    d.hits[i].setAttribute("x1",a.x);d.hits[i].setAttribute("y1",a.y);
    d.hits[i].setAttribute("x2",b.x);d.hits[i].setAttribute("y2",b.y);
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    let ox=mx-c.x,oy=my-c.y; const ol=Math.hypot(ox,oy)||1; ox/=ol;oy/=ol;
    const t=d.elen[i];
    t.textContent=s.elen[i]||"";
    t.setAttribute("x",mx+ox*18); t.setAttribute("y",my+oy*18);
  }
  for(let i=0;i<n;i++){
    d.verts[i].setAttribute("cx",p[i].x); d.verts[i].setAttribute("cy",p[i].y);
    let ix=c.x-p[i].x, iy=c.y-p[i].y; const il=Math.hypot(ix,iy)||1; ix/=il;iy/=il;
    const a=d.ang[i];
    a.textContent=s.ang[i]||"";
    a.setAttribute("x",p[i].x+ix*26); a.setAttribute("y",p[i].y+iy*26);
  }
}

function markSel(){
  shapes.forEach(s=>{ if(s.dom) s.dom.g.classList.toggle("sel", s.id===selId); });
}
function getShape(id){return shapes.find(s=>s.id==id);}
function refreshEmpty(){emptyEl.style.display=shapes.length?"none":"flex";}

function toSvg(clientX,clientY){
  const m=svg.getScreenCTM().inverse();
  const p=svg.createSVGPoint(); p.x=clientX;p.y=clientY;
  const r=p.matrixTransform(m); return {x:r.x,y:r.y};
}
function toScreen(x,y){
  const m=svg.getScreenCTM();
  const p=svg.createSVGPoint(); p.x=x;p.y=y;
  const r=p.matrixTransform(m); return {x:r.x,y:r.y};
}

let act=null;
svg.addEventListener("pointerdown",e=>{
  const t=e.target;
  const kind=t.dataset && t.dataset.kind;
  if(!kind){ selId=null; markSel(); hideEditor(); return; }
  const s=getShape(t.dataset.id); if(!s) return;
  const idx=+t.dataset.idx;
  selId=s.id; markSel();
  svg.appendChild(s.dom.g);
  const p=toSvg(e.clientX,e.clientY);
  act={kind,s,idx,sx:p.x,sy:p.y,moved:false,
       orig:s.pts.map(q=>({x:q.x,y:q.y}))};
  if(kind==="vtx") s.dom.verts[idx].classList.add("active");
  svg.setPointerCapture(e.pointerId);
  hideEditor();
});
svg.addEventListener("pointermove",e=>{
  if(!act) return;
  const p=toSvg(e.clientX,e.clientY);
  const dx=p.x-act.sx, dy=p.y-act.sy;
  if(!act.moved && Math.hypot(dx,dy)>TAP_DIST) act.moved=true;
  if(!act.moved) return;
  const s=act.s;
  if(act.kind==="vtx"){
    s.pts[act.idx]={x:act.orig[act.idx].x+dx, y:act.orig[act.idx].y+dy};
  }else{
    s.pts=act.orig.map(q=>({x:q.x+dx,y:q.y+dy}));
  }
  updateDom(s);
});
svg.addEventListener("pointerup",e=>{
  if(!act) return;
  const a=act; act=null;
  if(a.kind==="vtx") a.s.dom.verts[a.idx].classList.remove("active");
  try{svg.releasePointerCapture(e.pointerId);}catch(_){}
  if(!a.moved){
    if(a.kind==="edge") openEditor(a.s,"elen",a.idx);
    else openEditor(a.s,"ang",a.idx);
  }
});

let edTarget=null;
function openEditor(s,field,idx){
  edTarget={s,field,idx};
  const cur=(field==="elen"?s.elen[idx]:s.ang[idx])||"";
  lblInput.value=cur;
  lblInput.placeholder=field==="elen"?"長さ 例:6cm":"角度 例:60";
  let px,py;
  if(field==="elen"){const a=s.pts[idx],b=s.pts[(idx+1)%s.pts.length];px=(a.x+b.x)/2;py=(a.y+b.y)/2;}
  else {px=s.pts[idx].x;py=s.pts[idx].y;}
  const sc=toScreen(px,py);
  editor.style.left=sc.x+"px"; editor.style.top=sc.y+"px"; editor.style.display="block";
  setTimeout(()=>{lblInput.focus(); lblInput.select();},0);
}
function commitEditor(){
  if(!edTarget) return;
  let v=lblInput.value.trim();
  const o=edTarget; const s=o.s, field=o.field, idx=o.idx;
  if(field==="ang" && v && /^-?\d+(\.\d+)?$/.test(v)) v=v+"°";
  if(field==="elen") s.elen[idx]=v; else s.ang[idx]=v;
  updateDom(s); hideEditor();
}
function hideEditor(){editor.style.display="none"; edTarget=null;}
lblInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){e.preventDefault();commitEditor();}
  if(e.key==="Escape"){hideEditor();}
});
lblInput.addEventListener("blur",commitEditor);

document.querySelectorAll("[data-add]").forEach(b=>{
  b.addEventListener("click",()=>addShape(+b.dataset.add));
});
document.getElementById("del").addEventListener("click",()=>{
  if(selId==null) return;
  const s=getShape(selId); if(s){s.dom.g.remove(); shapes=shapes.filter(x=>x!==s);}
  selId=null; refreshEmpty();
});
document.getElementById("clear").addEventListener("click",()=>{
  shapes.forEach(s=>s.dom.g.remove()); shapes=[]; selId=null; refreshEmpty();
});

addShape(3);
</script>
</body>
</html>
